name: CI

# Runs on every PR and on direct pushes to main, before Cloudflare Pages
# picks the commit up. Cloudflare's auto-build is the deploy gate; this
# job catches type errors and build breakage at the PR stage.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build + check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (astro check + tsc)
        run: npm run check

      - name: Build
        run: npm run build
